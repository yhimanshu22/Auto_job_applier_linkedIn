<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading LinkdApply...</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.85);
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
    }
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    .splash-container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px;
      width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .splash-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
      animation: pulse 4s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }
    .brand-logo {
      max-width: 260px;
      width: 100%;
      height: auto;
      margin-bottom: 8px;
      z-index: 1;
      position: relative;
      display: block;
    }
    .status {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
      z-index: 1;
      height: 20px;
    }
    .loader {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .loader-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 4px;
      animation: loading 1.5s infinite ease-in-out;
    }
    .error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      z-index: 1;
    }
    .error-container.visible {
      display: flex;
    }
    .retry-button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 16px;
    }
    .retry-button:hover {
      background: #2563eb;
    }
    .retry-button:active {
      transform: scale(0.98);
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes loading {
      0% { left: -40%; width: 40%; }
      50% { left: 20%; width: 60%; }
      100% { left: 100%; width: 40%; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img class="brand-logo" src="logo.png" alt="LinkdApply" />
    <div class="status" id="status-text">Starting backend services...</div>
    
    <div class="loader" id="loader">
      <div class="loader-bar"></div>
    </div>

    <div class="error-container" id="error-container">
      <div style="color: #ef4444; font-size: 13px; margin-bottom: 8px;">Failed to connect to backend</div>
      <button class="retry-button" onclick="location.reload()">Retry Connection</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    
    ipcRenderer.on('backend-error', (event, message) => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('status-text').style.display = 'none';
      document.getElementById('error-container').classList.add('visible');
    });

    const messages = [
      "Starting backend services...",
      "Initializing automation...",
      "Warming up the engines...",
      "Preparing your dashboard...",
    ];
    let i = 0;
    setInterval(() => {
      if (document.getElementById('loader').style.display !== 'none') {
        i = (i + 1) % messages.length;
        document.getElementById('status-text').innerText = messages[i];
      }
    }, 2500);
  </script>
</body>
</html>
