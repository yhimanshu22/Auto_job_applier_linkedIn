name: Release desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional; defaults to v{VERSION} from VERSION file)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        if: github.event_name == 'push'
        shell: bash
        run: |
          VERSION=$(node scripts/read-version.js)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION (${VERSION})"
            exit 1
          fi

      - name: Sync desktop version from VERSION
        run: node scripts/sync-desktop-version.js

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install WiX (MSI bundler)
        run: dotnet tool install --global wix

      - name: Build Windows MSI
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        if: github.event_name == 'push'
        shell: bash
        run: |
          VERSION=$(node scripts/read-version.js)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION (${VERSION})"
            exit 1
          fi

      - name: Sync desktop version from VERSION
        run: node scripts/sync-desktop-version.js

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build macOS DMG (Apple Silicon)
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        if: github.event_name == 'push'
        shell: bash
        run: |
          VERSION=$(node scripts/read-version.js)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION (${VERSION})"
            exit 1
          fi

      - name: Sync desktop version from VERSION
        run: node scripts/sync-desktop-version.js

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install uv
        run: pip install uv

      - name: Build Linux AppImage
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          VERSION=$(node scripts/read-version.js)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${VERSION}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=LinkdApply ${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lah dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          draft: false
          prerelease: false
          files: dist/*
          fail_on_unmatched_files: false
          generate_release_notes: true
